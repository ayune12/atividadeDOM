<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    input {
      display: block;
      margin-bottom: 5px;
      padding: 6px;
      width: 250px;
    }

    .erro {
      color: red;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .sucesso {
      color: green;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h2>Cadastro</h2>

  <form id="form">
    <input type="text" id="nome" placeholder="Nome">
    <div id="erroNome" class="erro"></div>

    <input type="email" id="email" placeholder="Email">
    <div id="erroEmail" class="erro"></div>

    <input type="number" id="idade" placeholder="Idade">
    <div id="erroIdade" class="erro"></div>

    <input type="password" id="senha" placeholder="Senha">
    <div id="erroSenha" class="erro"></div>

    <input type="password" id="confirmarSenha" placeholder="Confirmar senha">
    <div id="erroConfirmar" class="erro"></div>

    <button type="submit">Cadastrar</button>
  </form>

  <p id="mensagem"></p>

  <script>
    const form = document.getElementById("form");
    const nome = document.getElementById("nome");
    const email = document.getElementById("email");
    const idade = document.getElementById("idade");
    const senha = document.getElementById("senha");
    const confirmarSenha = document.getElementById("confirmarSenha");

    const erroNome = document.getElementById("erroNome");
    const erroEmail = document.getElementById("erroEmail");
    const erroIdade = document.getElementById("erroIdade");
    const erroSenha = document.getElementById("erroSenha");
    const erroConfirmar = document.getElementById("erroConfirmar");

    const mensagem = document.getElementById("mensagem");

    function limparErros() {
      erroNome.textContent = "";
      erroEmail.textContent = "";
      erroIdade.textContent = "";
      erroSenha.textContent = "";
      erroConfirmar.textContent = "";
      mensagem.textContent = "";
    }

    function validar() {
      let valido = true;

      const nomeValor = nome.value.trim();
      const emailValor = email.value.trim();
      const idadeValor = Number(idade.value);
      const senhaValor = senha.value;
      const confirmarValor = confirmarSenha.value;

      if (nomeValor === "") {
        erroNome.textContent = "Nome obrigatório";
        valido = false;
      }

      if (emailValor === "" || !emailValor.includes("@")) {
        erroEmail.textContent = "Email inválido";
        valido = false;
      }

      if (!idadeValor || idadeValor < 18) {
        erroIdade.textContent = "Idade deve ser maior ou igual a 18";
        valido = false;
      }

      if (senhaValor.length < 8) {
        erroSenha.textContent = "Senha deve ter no mínimo 8 caracteres";
        valido = false;
      }

      if (confirmarValor !== senhaValor || confirmarValor === "") {
        erroConfirmar.textContent = "Senhas não coincidem";
        valido = false;
      }

      return valido;
    }

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      limparErros();

      if (validar()) {
        mensagem.textContent = "Cadastro realizado com sucesso!";
        mensagem.className = "sucesso";
        form.reset();
      }
    });
  </script>

</body>
</html>
