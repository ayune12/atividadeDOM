<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tabuada</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #resultado {
      margin-top: 15px;
    }

    .item {
      margin: 3px 0;
    }
  </style>
</head>
<body>

  <h2>Gerador de Tabuada</h2>

  <form id="formTabuada">
    <input type="number" id="numero" placeholder="Digite um número" required>
    <button type="submit">Gerar</button>
  </form>

  <div id="resultado"></div>

  <script>
    const form = document.getElementById("formTabuada");
    const numeroInput = document.getElementById("numero");
    const resultado = document.getElementById("resultado");

    function gerarTabuada(num) {
      resultado.innerHTML = "";

      for (let i = 1; i <= 10; i++) {

        const valor = num * i;

        const linha = document.createElement("p");
        linha.classList.add("item");
        linha.textContent = `${num} x ${i} = ${valor}`;

        resultado.appendChild(linha);
      }
    }

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const numero = Number(numeroInput.value);

      if (isNaN(numero)) {
        resultado.textContent = "Digite um número válido!";
        return;
      }

      gerarTabuada(numero);
    });
  </script>

</body>
</html>
